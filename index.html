<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* 页面标题 */
        .page-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
        }

        /* 卡片容器样式 */
        .card {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 头像上传区域 */
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #e0e0e0;
            cursor: pointer;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #avatar-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 输入框样式 */
        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 14px;
            color: #666;
        }

        .edit-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .edit-input:focus {
            border-color: #409eff;
        }

        textarea.edit-input {
            resize: none;
            min-height: 80px;
        }

        /* 保存按钮样式 */
        #save-btn {
            width: 100%;
            padding: 12px;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #save-btn:hover {
            background-color: #337ecc;
        }

        /* 展示信息样式 */
        .info-display {
            width: 100%;
            text-align: center;
            display: none; /* 默认隐藏，保存后显示 */
        }

        .name-display {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .bio-display {
            font-size: 15px;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1 class="page-title">个人信息卡片</h1>

    <div class="card">
        <!-- 头像上传区域 -->
        <div class="avatar-container">
            <img id="avatar-img" class="avatar" src="https://picsum.photos/100/100" alt="个人头像">
            <input type="file" id="avatar-input" accept="image/*">
        </div>

        <!-- 编辑区域 -->
        <div class="input-group">
            <label class="input-label">姓名</label>
            <input type="text" id="name-input" class="edit-input" placeholder="请输入你的姓名">
        </div>

        <div class="input-group">
            <label class="input-label">个人简介</label>
            <textarea id="bio-input" class="edit-input" placeholder="请输入你的个人简介"></textarea>
        </div>

        <!-- 保存按钮 -->
        <button id="save-btn">保存信息</button>

        <!-- 信息展示区域 -->
        <div class="info-display" id="info-display">
            <div class="name-display" id="name-display"></div>
            <div class="bio-display" id="bio-display"></div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const avatarInput = document.getElementById('avatar-input');
        const avatarImg = document.getElementById('avatar-img');
        const nameInput = document.getElementById('name-input');
        const bioInput = document.getElementById('bio-input');
        const saveBtn = document.getElementById('save-btn');
        const infoDisplay = document.getElementById('info-display');
        const nameDisplay = document.getElementById('name-display');
        const bioDisplay = document.getElementById('bio-display');

        // 1. 头像上传预览功能
        avatarInput.addEventListener('change', function(e) {
            // 获取用户选择的文件
            const file = e.target.files[0];
            if (file) {
                // 创建文件读取对象
                const reader = new FileReader();
                // 读取完成后更新头像
                reader.onload = function(event) {
                    avatarImg.src = event.target.result;
                };
                // 读取图片文件
                reader.readAsDataURL(file);
            }
        });

        // 2. 保存信息功能
        saveBtn.addEventListener('click', function() {
            // 获取输入框内容
            const name = nameInput.value.trim();
            const bio = bioInput.value.trim();

            // 简单校验
            if (!name) {
                alert('请输入姓名！');
                return;
            }

            // 将内容渲染到展示区域
            nameDisplay.textContent = name;
            bioDisplay.textContent = bio;

            // 隐藏编辑框，显示展示信息
            nameInput.style.display = 'none';
            bioInput.style.display = 'none';
            infoDisplay.style.display = 'block';
            
            // 修改按钮文字
            saveBtn.textContent = '修改信息';
            
            // 再次点击时切换回编辑模式
            saveBtn.onclick = editInfo;
        });

        // 3. 修改信息功能
        function editInfo() {
            // 显示编辑框，隐藏展示信息
            nameInput.style.display = 'block';
            bioInput.style.display = 'block';
            infoDisplay.style.display = 'none';
            
            // 恢复按钮文字和功能
            saveBtn.textContent = '保存信息';
            saveBtn.onclick = null;
            saveBtn.addEventListener('click', arguments.callee.caller);
        }
    </script>
</body>
</html>
